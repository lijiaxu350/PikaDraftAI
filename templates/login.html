{% extends "layout.html" %}

{% block content %}
<div class="login-card">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-save-container">
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </div>
    </form>
    <p class="auth-helper-text">
        Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </p>
</div>
{% endblock %}
