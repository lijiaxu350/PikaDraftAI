{% extends "layout.html" %}

{% block content %}
<div class="login-card">
    <h2>Login to PikaDraftAI</h2>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
            <p class="error-msg">Invalid username or password.</p>
        {% endif %}
        
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" autofocus required id="id_username" class="form-control">
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" required id="id_password" class="form-control">
        </div>
        
        <div class="btn-save-container">
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </div>
    </form>
    <p class="auth-helper-text">
        Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </p>
</div>
{% endblock %}
