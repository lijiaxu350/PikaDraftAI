{% extends "layout.html" %}

{% block content %}
<h1>Teams</h1>

<div class="teams-home-options">
    <a href="{% url 'create_team' %}" class="option-button">Create New Team</a>
</div>

<h2>Existing Teams</h2>
<ul class= "teams-grid">
    {% for team in teams %}
        <li class= "team-card"><a href="{% url 'team_detail' team.id %}">{{ team.name }}</a></li>
    {% empty %}
        <li class = "no-teams">No teams yet, create one above!</li>
    {% endfor %}
</ul>
{% endblock %}
